<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#2563eb" />
  <meta name="description" content="선택과목 - 고교학점제 선택과목 맞춤 추천 플랫폼" />
  <title>선택과목 | 고교학점제 선택과목 추천</title>
  <!-- 외부 라이브러리 없음 — 시스템 폰트 사용 -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- 상단 네비게이션 -->
  <header class="site-header" id="top">
    <div class="header-inner">
      <a href="#" class="logo" data-nav="home" aria-label="선택과목 홈">
        <span class="logo-text">선택과목</span>
      </a>

      <nav class="main-nav" aria-label="주요 메뉴">
        <button type="button" class="nav-link" data-nav="curriculum">교육과정</button>
      </nav>

      <div class="header-actions">
        <button type="button" class="btn btn-outline btn-login">로그인</button>
        <button type="button" class="nav-toggle" id="navToggle" aria-expanded="false" aria-controls="mobileNav">
          <span></span><span></span><span></span>
        </button>
      </div>
    </div>
    <div class="mobile-nav" id="mobileNav" hidden></div>
  </header>

  <main>
    <!-- ========== 홈 ========== -->
    <section id="view-home" class="view view-active">
      <div class="hero reveal">
        <h1 class="hero-title">선택과목 선택</h1>
      </div>

      <div class="home-cards reveal">
        <article class="choice-card" data-nav="university" tabindex="0" role="button">
          <h2>목표 대학·학과가 있어요</h2>
          <p>희망 대학과 학과를 선택하면 권장 과목과 <strong>우리학교 개설 과목</strong>을 비교해 추천합니다.</p>
          <span class="choice-card-cta">추천 받기 →</span>
        </article>
        <article class="choice-card choice-card-alt" data-nav="track" tabindex="0" role="button">
          <h2>아직 진로를 못 정했어요</h2>
          <p>공학·의학·인문·경영·예체능·IT 등 <strong>계열 기반</strong> 로드맵과 학과를 안내합니다.</p>
          <span class="choice-card-cta">계열 선택 →</span>
        </article>
      </div>

    </section>

    <!-- ========== 대학·학과 추천 ========== -->
    <section id="view-university" class="view">
      <div class="page-head reveal">
        <button type="button" class="btn btn-ghost back-home" data-nav="home">← 홈</button>
        <h1>목표 대학·학과 기반 추천</h1>
      </div>

      <div class="form-panel reveal">
        <div class="form-row">
          <label for="selUniversity">대학</label>
          <select id="selUniversity"></select>
        </div>
        <div class="form-row">
          <label for="selMajor">학과</label>
          <select id="selMajor"></select>
        </div>
        <button type="button" class="btn btn-primary" id="btnLoadMajor">추천 불러오기</button>
      </div>

      <div id="majorResultArea" class="result-area" aria-live="polite"></div>
    </section>

    <!-- ========== 진로 미정 ========== -->
    <section id="view-track" class="view">
      <div class="page-head reveal">
        <button type="button" class="btn btn-ghost back-home" data-nav="home">← 홈</button>
        <h1>진로 미정 · 계열 기반 추천</h1>
      </div>

      <div class="track-buttons reveal" id="trackButtons" role="tablist" aria-label="진로 계열"></div>
      <div id="trackResultArea" class="result-area"></div>
    </section>

    <!-- ========== 교육과정 ========== -->
    <section id="view-curriculum" class="view">
      <div class="page-head reveal">
        <button type="button" class="btn btn-ghost back-home" data-nav="home">← 홈</button>
        <h1>우리학교 교육과정</h1>
        <p>개설 과목 목록입니다. 추천 결과의「개설 여부」는 이 목록과 자동 대조됩니다.</p>
      </div>
      <ul id="curriculumList" class="pill-list reveal"></ul>
    </section>
  </main>

  <div id="toast" class="toast" role="status" aria-live="polite" hidden></div>

  <script src="script.js"></script>
</body>
</html>
